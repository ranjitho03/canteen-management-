version: '3.8'

services:
  db:
    image: postgres:14
    environment:
      POSTGRES_USER: canteen
      POSTGRES_PASSWORD: canteen
      POSTGRES_DB: canteen_db
    ports:
      - "5432:5432"

  backend:
    build: ./backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      - db